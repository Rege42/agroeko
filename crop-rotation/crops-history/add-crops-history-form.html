<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>АгроПоле | Форма севооборота</title>
    <link rel="stylesheet" href="/static/stylesheets/variables.css" />
    <link rel="stylesheet" href="/static/stylesheets/button-style.css" />
    <link rel="stylesheet" href="/static/stylesheets/input.css" />
    <link rel="stylesheet" href="/static/stylesheets/items.css" />
    <link rel="stylesheet" href="/static/stylesheets/style.css" />
  </head>
  <body>
    <div class="form-overlay">
      <div class="standart-form">
        <a href="crops-history-field.html">
          <button class="close-button">
            <img src="/static/assets/close.svg" alt="Закрыть" class="close-icon" />
          </button>
        </a>

        <h2>Добавление севооборота</h2>
        <form action="crops-history-field.html">
          <div class="standart-form-group">
            <label for="year">Год:</label>
            <input type="text" id="year" name="year" class="standart-input" pattern="\d*" />
          </div>
          <div class="standart-form-group">
            <label for="crop">Культура:</label>
            <input type="text" id="crop" name="crop" class="standart-input" />
          </div>
          <div class="standart-form-group">
            <label for="predicted-yield">Прогнозируемая урожайность:</label>
            <input type="text" id="predicted-yield" name="predicted-yield" class="standart-input" pattern="\d*.\d{2}" />
          </div>
          <div class="standart-form-group">
            <label for="actual-yield">Урожайность:</label>
            <input type="text" id="actual-yield" name="actual-yield" class="standart-input" pattern="\d*.\d{2}" />
          </div>
          <div class="standart-form-group">
            <label for="notes">Замечания:</label>
            <textarea id="notes" name="notes" class="standart-input" rows="5"></textarea>
          </div>
          <div class="standart-form-group">
            <button type="submit" class="form-button">Добавить</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
