<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>АгроПоле | Форма добавления поля</title>
    <link rel="stylesheet" href="/static/stylesheets/variables.css" />
    <link rel="stylesheet" href="/static/stylesheets/button-style.css" />
    <link rel="stylesheet" href="/static/stylesheets/input.css" />
    <link rel="stylesheet" href="/static/stylesheets/items.css" />
    <link rel="stylesheet" href="/static/stylesheets/style.css" />
  </head>

  <body>
    <!-- Шапка -->
    <header class="header">
      <a href="/index.html" class="logo">
        <img src="/static/assets/logo.png" alt="Логотип" class="logo-img" />
      </a>
      <div class="login-section">
        <button class="login-button">
          <span class="login-text">Вход</span>
          <img src="/static/assets/login.png" alt="Иконка входа" class="login-icon" />
        </button>
      </div>
    </header>

    <!-- Навигационная панель -->
    <nav class="sidebar">
      <ul class="nav-links">
        <ul class="nav-links">
          <li class="nav-item-pressed">
            <input type="radio" name="nav-menu" id="seed-menu" class="menu-toggle" />
            <label for="seed-menu" class="nav-icon-container">
              <img src="/static/assets/seed.png" alt="Иконка севооборота" class="nav-icon" />
            </label>
            <ul class="submenu">
              <li><a href="/crop-rotation/crops-history/crops-history.html">История посевов</a></li>
              <li><a href="/crop-rotation/add-field/crops-history-add-field.html">Добавить поле</a></li>
              <li><a href="/crop-rotation/crops-compability/crops-compatibility.html">Совместимость культур</a></li>
              <li><a href="/crop-rotation/agrotechnical-plan/agrotechnical-plan.html">Агротехнологический план</a></li>
            </ul>
          </li>
          <li>
            <a href="#" class="nav-link">
              <img src="/static/assets/map.png" alt="Иконка карт" class="nav-icon" />
            </a>
          </li>
          <li class="nav-item">
            <input type="radio" name="nav-menu" id="analysis-menu" class="menu-toggle" />
            <label for="analysis-menu" class="nav-icon-container">
              <img src="/static/assets/analisys.png" alt="Иконка аналитик" class="nav-icon" />
            </label>
            <ul class="submenu">
              <li><a href="/analitics/indicators/indicators.html">Показатели предприятия</a></li>
              <li><a href="/analitics/forecasting/forecasting.html">Прогнозирование</a></li>
              <li><a href="/analitics/reports/reports.html">Отчетность</a></li>
            </ul>
          </li>
          <li>
            <a href="#" class="nav-link">
              <img src="/static/assets/techmap.png" alt="Иконка тех карт" class="nav-icon" />
            </a>
          </li>
          <li>
            <a href="#" class="nav-link">
              <img src="/static/assets/tech.png" alt="Иконка техники" class="nav-icon" />
            </a>
          </li>
          <li>
            <a href="#" class="nav-link">
              <img src="/static/assets/glossary.png" alt="Иконка справочников" class="nav-icon" />
            </a>
          </li>
          <li>
            <a href="#" class="nav-link">
              <img src="/static/assets/settings.png" alt="Иконка настроек" class="nav-icon" />
            </a>
          </li>
        </ul>

        <div class="empty-icon-container">
          <div class="empty-icon">
            <img src="/static/assets/unwrap.png" alt="Иконка раскрытия" class="nav-icon" />
          </div>
        </div>
      </ul>
    </nav>

    <!-- Основное содержимое -->
    <main class="main-content">
      <div class="form-container">
        <form class="soil-form" action="crops-history-add-field.html">
          <div class="form-group">
            <label for="name">Название:</label>
            <input type="text" id="name" class="standart-input" />
            <button type="submit" class="standart-button">Сохранить</button>
          </div>

          <div class="form-group">
            <label for="area">Площадь (га):</label>
            <input type="text" id="area" class="standart-input" pattern="\d*.\d{2}" />
          </div>
          <div class="form-group">
            <label for="precipitation">Осадки (мм):</label>
            <input type="text" id="precipitation" class="standart-input" pattern="\d*" />
          </div>

          <div class="form-group">
            <label for="humidity">Влажность (%):</label>
            <input type="text" id="humidity" class="standart-input" pattern="\d*.\d{2}" />
          </div>
          <div class="form-group">
            <label for="temperature">Средняя температура (°C):</label>
            <input type="text" id="temperature" class="standart-input" pattern="\d*.\d{2}" />
          </div>

          <div class="form-group">
            <label for="ph">pH почвы:</label>
            <input type="text" id="ph" class="standart-input" step="0.1" pattern="\d*.\d{2}" />
          </div>
          <div class="form-group">
            <label for="nutrients">Уровень питательных веществ:</label>
            <select id="nutrients" class="standart-input">
              <option value="low">Низкий</option>
              <option value="medium">Средний</option>
              <option value="high">Высокий</option>
            </select>
          </div>

          <div class="form-group">
            <label for="organic">Содержание органики (%):</label>
            <input type="text" id="organic" class="standart-input" pattern="\d*.\d{2}" />
          </div>
          <div class="form-group">
            <label for="soil-type">Тип почвы:</label>
            <select id="soil-type" class="standart-input">
              <option value="sandy">Песчаная</option>
              <option value="loamy">Суглинистая</option>
              <option value="clay">Глинистая</option>
            </select>
          </div>

          <div class="form-group">
            <label for="soil-moisture">Влажность почвы (%):</label>
            <input type="text" id="soil-moisture" class="standart-input" pattern="\d*.\d{2}" />
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
