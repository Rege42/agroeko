<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АгроПоле | Форма отчета</title>

    <link rel="stylesheet" href="/static/stylesheets/style.css">
    <link rel="stylesheet" href="/static/stylesheets/form_style.css">
</head>

<body>
    <!-- Шапка -->
    <header class="header">
        <a href="/index.html" class="logo">
            <img src="/static/assets/logo.png" alt="Логотип" class="logo-img">
        </a>
        <div class="login-section">
            <button class="login-button">
                <span class="login-text">Вход</span>
                <img src="/static/assets/login.png" alt="Иконка входа" class="login-icon">
            </button>
        </div>
    </header>

    <!-- Навигационная панель -->
    <nav class="sidebar">
        <ul class="nav-links">
            <ul class="nav-links">
                <li class="nav-item">
                    <input type="radio" name="nav-menu" id="seed-menu" class="menu-toggle">
                    <label for="seed-menu" class="nav-icon-container">
                        <img src="/static/assets/seed.png" alt="Иконка севооборота" class="nav-icon">
                    </label>
                    <ul class="submenu">
                        <li><a href="/crop-rotation/crops-history/crops-history.html">История посевов</a></li>
                        <li><a href="/crop-rotation/add-field/crops-history-add-field.html">Добавить поле</a></li>
                        <li><a href="/crop-rotation/crops-compability/crops-compatibility.html">Совместимость культур</a></li>
                        <li><a href="/crop-rotation/agrotechnical-plan/agrotechnical-plan.html">Агротехнологический план</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/map.png" alt="Иконка карт" class="nav-icon">
                    </a>
                </li>
                <li class="nav-item-pressed">
                    <input type="radio" name="nav-menu" id="analysis-menu" class="menu-toggle">
                    <label for="analysis-menu" class="nav-icon-container">
                        <img src="/static/assets/analisys.png" alt="Иконка аналитик" class="nav-icon">
                    </label>
                    <ul class="submenu">
                        <li><a href="/analitics/indicators/indicators.html">Показатели предприятия</a></li>
                        <li><a href="/analitics/forecasting/forecasting.html">Прогнозирование</a></li>
                        <li><a href="/analitics/reports/reports.html">Отчетность</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/techmap.png" alt="Иконка тех карт" class="nav-icon">
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/tech.png" alt="Иконка техники" class="nav-icon">
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/glossary.png" alt="Иконка справочников" class="nav-icon">
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/settings.png" alt="Иконка настроек" class="nav-icon">
                    </a>
                </li>
            </ul>

            <div class="empty-icon-container">
                <div class="empty-icon">
                    <img src="/static/assets/unwrap.png" alt="Иконка раскрытия" class="nav-icon">
                </div>
            </div>
    </nav>

    <!-- Основное содержимое -->
    <main class="main-content">
        <div class="forecast-form-container">
            <h1 class="form-title">Прогнозирование урожайности</h1>

            <form id="forecastForm" class="report-form" action="yield_forecast.html" method="GET">
                <!-- Секция выбора культуры -->
                <div class="form-section">
                    <h2 class="section-title">
                        <span class="icon">🌱</span> Параметры культуры
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="crop-type" class="form-label">Тип культуры</label>
                            <select id="crop-type" class="form-select">
                                <option value="" disabled selected>Выберите культуру</option>
                                <option value="wheat">Пшеница озимая</option>
                                <option value="barley">Ячмень</option>
                                <option value="rape">Рапс</option>
                                <option value="corn">Кукуруза</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="crop-area" class="form-label">Площадь (га)</label>
                            <input type="number" id="crop-area" class="form-input" min="1" value="10">
                        </div>
                    </div>
                </div>

                <!-- Секция параметров прогноза -->
                <div class="form-section">
                    <h2 class="section-title">
                        <span class="icon">🔮</span> Параметры прогноза
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="forecast-model" class="form-label">Модель прогнозирования</label>
                            <select id="forecast-model" class="form-select">
                                <option value="standard" selected>Стандартная (исторические данные)</option>
                                <option value="advanced">Продвинутая (с погодными факторами)</option>
                                <option value="ai">ИИ-модель</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="forecast-period" class="form-label">Период прогноза</label>
                            <select id="forecast-period" class="form-select">
                                <option value="1month">1 месяц</option>
                                <option value="3months" selected>3 месяца</option>
                                <option value="season">Весь сезон</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Секция дополнительных параметров -->
                <div class="form-section">
                    <h2 class="section-title">
                        <span class="icon">⚙️</span> Дополнительные настройки
                    </h2>
                    <div class="form-group">
                        <label class="form-checkbox-label">
                            <input type="checkbox" id="include-weather" class="form-checkbox" checked>
                            <span>Учитывать прогноз погоды</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox-label">
                            <input type="checkbox" id="include-soil" class="form-checkbox">
                            <span>Учитывать состояние почвы</span>
                        </label>
                    </div>
                </div>

                <!-- Кнопки действий -->
                <div class="form-actions">
                    <a href="forecasting.html" class="form-button secondary">Отмена</a>
                    <button type="submit" class="form-button primary">Рассчитать прогноз</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
