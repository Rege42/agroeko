<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АгроПоле | Форма отчета</title>

    <link rel="stylesheet" href="/static/stylesheets/style.css">
    <link rel="stylesheet" href="/static/stylesheets/form_style.css">
</head>

<body>
    <!-- Шапка -->
    <header class="header">
        <a href="/index.html" class="logo">
            <img src="/static/assets/logo.png" alt="Логотип" class="logo-img">
        </a>
        <div class="login-section">
            <button class="login-button">
                <span class="login-text">Вход</span>
                <img src="/static/assets/login.png" alt="Иконка входа" class="login-icon">
            </button>
        </div>
    </header>

    <!-- Навигационная панель -->
    <nav class="sidebar">
        <ul class="nav-links">
            <ul class="nav-links">
                <li class="nav-item">
                    <input type="radio" name="nav-menu" id="seed-menu" class="menu-toggle">
                    <label for="seed-menu" class="nav-icon-container">
                        <img src="/static/assets/seed.png" alt="Иконка севооборота" class="nav-icon">
                    </label>
                    <ul class="submenu">
                        <li><a href="/crop-rotation/crops-history/crops-history.html">История посевов</a></li>
                        <li><a href="/crop-rotation/add-field/crops-history-add-field.html">Добавить поле</a></li>
                        <li><a href="/crop-rotation/crops-compability/crops-compatibility.html">Совместимость культур</a></li>
                        <li><a href="/crop-rotation/agrotechnical-plan/agrotechnical-plan.html">Агротехнологический план</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/map.png" alt="Иконка карт" class="nav-icon">
                    </a>
                </li>
                <li class="nav-item-pressed">
                    <input type="radio" name="nav-menu" id="analysis-menu" class="menu-toggle">
                    <label for="analysis-menu" class="nav-icon-container">
                        <img src="/static/assets/analisys.png" alt="Иконка аналитик" class="nav-icon">
                    </label>
                    <ul class="submenu">
                        <li><a href="/analitics/indicators/indicators.html">Показатели предприятия</a></li>
                        <li><a href="/analitics/forecasting/forecasting.html">Прогнозирование</a></li>
                        <li><a href="/analitics/reports/reports.html">Отчетность</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/techmap.png" alt="Иконка тех карт" class="nav-icon">
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/tech.png" alt="Иконка техники" class="nav-icon">
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/glossary.png" alt="Иконка справочников" class="nav-icon">
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <img src="/static/assets/settings.png" alt="Иконка настроек" class="nav-icon">
                    </a>
                </li>
            </ul>

            <div class="empty-icon-container">
                <div class="empty-icon">
                    <img src="/static/assets/unwrap.png" alt="Иконка раскрытия" class="nav-icon">
                </div>
            </div>
    </nav>

    <!-- Основное содержимое -->
    <main class="main-content">
        <div class="report-form-container">
            <h1 class="form-title">Параметры отчета</h1>

            <form class="report-form" action="monthly_report.html" method="GET">
                <!-- Секция выбора периода -->
                <div class="form-section">
                    <h2 class="section-title">
                        <span class="icon">📅</span> Период анализа
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="period-type" class="form-label">Тип периода</label>
                            <select id="period-type" class="form-select">
                                <option value="day">День</option>
                                <option value="week" selected>Неделя</option>
                                <option value="month">Месяц</option>
                                <option value="quarter">Квартал</option>
                                <option value="year">Год</option>
                                <option value="custom">Произвольный</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="start-date" class="form-label">Начальная дата</label>
                            <input type="date" id="start-date" class="form-input" value="2024-06-01">
                        </div>

                        <div class="form-group">
                            <label for="end-date" class="form-label">Конечная дата</label>
                            <input type="date" id="end-date" class="form-input" value="2024-06-30">
                        </div>
                    </div>
                </div>

                <!-- Секция выбора полей -->
                <div class="form-section">
                    <h2 class="section-title">
                        <span class="icon">🌾</span> Выбор полей
                    </h2>
                    <div class="form-group">
                        <div class="form-checkbox-group">
                            <label class="form-checkbox-label">
                                <input type="checkbox" checked class="form-checkbox">
                                <span>Все поля</span>
                            </label>
                        </div>
                        <div class="form-scrollable">
                            <div class="form-checkbox-group">
                                <label class="form-checkbox-label">
                                    <input type="checkbox" checked class="form-checkbox">
                                    <span>Поле №1 (Пшеница)</span>
                                </label>
                            </div>
                            <div class="form-checkbox-group">
                                <label class="form-checkbox-label">
                                    <input type="checkbox" checked class="form-checkbox">
                                    <span>Поле №2 (Ячмень)</span>
                                </label>
                            </div>
                            <!-- Добавьте другие поля по аналогии -->
                        </div>
                    </div>
                </div>

                <!-- Секция дополнительных параметров -->
                <div class="form-section">
                    <h2 class="section-title">
                        <span class="icon">⚙️</span> Дополнительные параметры
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="report-type" class="form-label">Тип отчета</label>
                            <select id="report-type" class="form-select">
                                <option value="standard" selected>Стандартный</option>
                                <option value="detailed">Детализированный</option>
                                <option value="technical">Технический</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="format" class="form-label">Формат вывода</label>
                            <select id="format" class="form-select">
                                <option value="web" selected>Веб-страница</option>
                                <option value="pdf">PDF</option>
                                <option value="excel">Excel</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Кнопки действий -->
                <div class="form-actions">
                    <a href="reports.html" class="form-button secondary">Отмена</a>
                    <button type="submit" class="form-button primary">Сформировать</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
